signoz:
  url: "http://signoz:8080"
  namespace: signoz

dashboards:
  # Files should be placed in: charts/signoz-importer/dashboards/
  - k8s-cluster-metrics-overall.json
  - k8s-events.json
  - k8s-host-metrics.json
  - k8s-node-metrics-detailed.json
  - k8s-node-metrics-overall.json
  - k8s-pod-metrics-detailed.json
  - k8s-pod-metrics-overall.json
  - k8s-pvc-metrics.json
  - aws-elasticache-redis.json
  - aws-rds-postgres.json
  - clickhouse-overview.json
  - lambda-api.json
  - k8s-api.json
  - notify-api-traces.json
  - notify-admin-traces.json

pipelines:
  # File should be placed in: charts/signoz-importer/pipelines/
  enabled: true
  file: pipelines.json

{{- if and .Values.acme.enabled .Values.acme.bootstrapSelfSignedSecret .Values.acme.certificate.secretName }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace .Values.acme.certificate.secretName) -}}
{{- if not $existing }}
{{- $cn := "localhost" -}}
{{- if gt (len .Values.acme.certificate.dnsNames) 0 -}}
{{- $cn = index .Values.acme.certificate.dnsNames 0 -}}
{{- end -}}
{{- $cert := genSelfSignedCert $cn nil .Values.acme.certificate.dnsNames 7 -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.acme.certificate.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nginx-ingress.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
{{- end }}

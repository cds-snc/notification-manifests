image:
  repository: public.ecr.aws/cds-snc/notify-api
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

terminationGracePeriodSeconds: 120

serviceAccount:
  create: true
  name: notify-jobs
  annotations: {}

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}

secretProviderClass:
  secretname: notify-jobs
  enabled: true
  provider: aws

dockerhub:
  username: "changeme"
  pat: "changeme"

cronJobDefaults:
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  useInlineScripts: true
  secretKeyRefOptional: true
  backoffLimit: 0
  restartPolicy: Never
  ttlSecondsAfterFinished: 604800
  activeDeadlineSeconds: 43200
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

scheduledScriptCronJobs:
  []

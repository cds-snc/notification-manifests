apiVersion: batch/v1
kind: Job
metadata:
  name: notify-db-migration-job-{{ .Values.image.tag }}-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: notify-db-migration
    tier: database
    release: {{ .Release.Name }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: notify-db-migration
        tier: database
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.serviceAccount.serviceAccountName }}
      initContainers:
        - name: init-postgres
          image: alpine
          command:
            - sh
            - -c
            - until nslookup "$(cat /mnt/secrets-store/{{ .Values.dbSecrets.POSTGRES_HOST }})"; do echo waiting for postgres; sleep 2; done;
          {{- if .Values.secretProviderClass.enabled }}
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          {{- end }}
      containers:
        - name: db-migration
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - sh
            - -ceu
            - |
              {{- range $key, $val := .Values.dbSecrets }}
              export {{ $key }}="$(cat /mnt/secrets-store/{{ $val }})"
              {{- end }}
              exec poetry run flask db {{ .Values.database.args }}
          env:
            # Common ENV Variables
            {{- range $key, $val := .Values.db }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            # Node-specific variables
            - name: STATSD_HOST
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- if .Values.secretProviderClass.enabled }}
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          {{- end }}
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
      
      {{- if .Values.secretProviderClass.enabled }}
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "db.fullname" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
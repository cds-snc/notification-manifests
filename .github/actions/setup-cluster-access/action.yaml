name: Setup Cluster Access
description: Setup VPN, AWS credentials, and kubeconfig for a given environment

inputs:
  environment:
    description: Environment name (staging, production, dev)
    required: true
  aws-account-id:
    description: AWS Account ID for the environment
    required: true
  op-service-account-token:
    description: 1Password service account token
    required: true
  role-name:
    description: IAM role name to assume
    required: true

runs:
  using: composite
  steps:
    - name: Install 1Password CLI
      shell: bash
      run: |
        curl -o 1pass.deb https://downloads.1password.com/linux/debian/amd64/stable/1password-cli-amd64-latest.deb
        sudo dpkg -i 1pass.deb
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.op-service-account-token }}

    - name: Setup Terraform tools
      uses: cds-snc/terraform-tools-setup@v1
      env:
        TERRAGRUNT_VERSION: 0.66.9

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
      with:
        role-to-assume: arn:aws:iam::${{ inputs.aws-account-id }}:role/${{ inputs.role-name }}
        role-session-name: ClusterAccess
        aws-region: ca-central-1

    - name: Cache Terraform providers
      shell: bash
      run: |
        git clone https://github.com/cds-snc/notification-terraform.git /var/tmp/notification-terraform
        
        # Download tfvars needed for terragrunt init
        OP_VAULT=$([ "${{ inputs.environment }}" = "production" ] && echo "ppnxsriom3alsxj4ogikyjxlzi" || echo "4eyyuwddp6w4vxlabrr2i2duxm")
        op read "op://${OP_VAULT}/TERRAFORM_SECRETS_${{ inputs.environment }}/notesPlain" > /var/tmp/notification-terraform/aws/${{ inputs.environment }}.tfvars
        
        cd /var/tmp/notification-terraform
        export INFRASTRUCTURE_VERSION=$(cat .github/workflows/infrastructure_version.txt 2>/dev/null || echo "unknown")
        
        export TF_PLUGIN_CACHE_DIR=~/.terraform.d/plugin-cache
        mkdir -p $TF_PLUGIN_CACHE_DIR
        
        # Write an explicitly defined terraform required_providers block 
        # so raw terraform init has exactly what it needs to resolve the locks
        cat <<EOF > env/${{ inputs.environment }}/cache_plugins.tf
        terraform {
          required_providers {
            aws = { source = "hashicorp/aws", version = "6.15.0" }
            null = { source = "hashicorp/null", version = "3.2.4" }
            tls = { source = "hashicorp/tls", version = "4.1.0" }
            github = { source = "integrations/github", version = "6.7.3" }
            archive = { source = "hashicorp/archive", version = "2.7.1" }
          }
        }
        EOF
        cd env/${{ inputs.environment }}
        terraform init -upgrade || true
        
        cd eks
        terragrunt init -upgrade || true
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.op-service-account-token }}

    - name: Retrieve VPN Config
      shell: bash
      run: scripts/createVPNConfig.sh ${{ inputs.environment }}
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.op-service-account-token }}

    - name: Install OpenVPN
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y openvpn

    - name: Connect to VPN
      uses: kota65535/github-openvpn-connect-action@cd2ed8a90cc7b060dc4e001143e811b5f7ea0af5 # v3.1.0
      with:
        config_file: /var/tmp/${{ inputs.environment }}.ovpn
        echo_config: false

    - name: Configure kubeconfig
      shell: bash
      run: |
        aws eks update-kubeconfig --name notification-canada-ca-${{ inputs.environment }}-eks-cluster --alias ${{ inputs.environment }}

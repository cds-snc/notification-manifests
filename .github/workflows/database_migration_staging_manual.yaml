name: Staging - Database Migration Manual (Flask Commands)

on:
  workflow_dispatch:
    inputs:
      flask_command:
        description: "Select the Flask command to run"
        required: true
        type: choice
        options:
          - upgrade
          - downgrade

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  HELMFILE_FILE_PATH: ${{ github.workspace }}/helmfile
  STAGING_AWS_ACCOUNT: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}
  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_STAGING }}
  ACCOUNT_ID: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}
  AWS_DEFAULT_REGION: ca-central-1

permissions:
  id-token: write # This is required for requesting the OIDC JWT
  contents: write # This is required for actions/checkout
  pull-requests: write

jobs:
  helmfile-database-job:
    runs-on: ubuntu-latest
    steps:

      - name: Inject token authentication
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure credentials to Notify using OIDC
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{env.ACCOUNT_ID}}:role/notification-manifests-database-migration-staging
          role-session-name: NotifyManifestsApply
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          # Fetches entire history, so we can analyze commits since last tag
          fetch-depth: 0        

      - name: Setup helmfile
        uses: mamezou-tech/setup-helmfile@fd46979d2984c886929c416fbdf859b1c5efa0ea # v2.1.0
        with:
          install-kubectl: yes
          install-helm: yes        
          helmfile-version: "v1.4.4"
          helm-s3-plugin-version: "v0.16.2"

      - name: Setup Terraform tools
        uses: cds-snc/terraform-tools-setup@v1
        env: # In case you want to override default versions
          CONFTEST_VERSION: 0.30.0 
          TERRAFORM_VERSION: 1.9.5
          TERRAGRUNT_VERSION: 0.66.9
          TF_SUMMARIZE_VERSION: 0.2.3                    

      - name: Setup cluster access
        uses: ./.github/actions/setup-cluster-access
        with:
          environment: staging
          aws-account-id: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}
          op-service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_STAGING }}
          role-name: notification-manifests-database-migration-staging
          gha-vpn-id: ${{ secrets.GHA_VPN_ID_STAGING }}
          gha-vpn-cert: ${{ secrets.GHA_VPN_CERT_STAGING }}
          gha-vpn-key: ${{ secrets.GHA_VPN_KEY_STAGING }}

      - name: Load Context Variables
        run: |
            ./helmfile/getContext.sh -g
             
      - name: Run Database Downgrade Helmfile Sync
        uses: ./.github/actions/db-migration
        with:
          environment: "staging"
          namespace: "notification-canada-ca"
          app_label: "notify-database"
          timeout: "400s"
          db_args: "${{ inputs.flask_command }}"

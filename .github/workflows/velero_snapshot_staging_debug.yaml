name: Velero - Snapshot Staging Debug
run-name: Velero - Snapshot (Staging Debug)

on:
  push:
    branches:
      - workflow-staging-test

concurrency:
  group: velero-snapshot-staging-debug
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  AWS_DEFAULT_REGION: ca-central-1
  ENVIRONMENT: staging
  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_STAGING }}
  ACCOUNT_ID: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}

permissions:
  id-token: write
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Configure credentials to Notify using OIDC
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{env.ACCOUNT_ID}}:role/notification-manifests-helmfile-staging-apply
          role-session-name: ClusterAccess
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Install OpenVPN
        run: |
          sudo apt update
          sudo apt install -y openvpn openvpn-systemd-resolved

      - name: Install 1Pass CLI
        run: |
          curl -o 1pass.deb https://downloads.1password.com/linux/debian/amd64/stable/1password-cli-amd64-latest.deb
          sudo dpkg -i 1pass.deb 

      - name: Setup Terraform tools
        uses: cds-snc/terraform-tools-setup@v1
        env:
          TERRAGRUNT_VERSION: 0.66.9
          
      - name: Retrieve VPN Config
        run: |
          # Inline patch to disable caching recursively for this script
          sed -i "s/terragrunt init -reconfigure -upgrade/export TF_PLUGIN_CACHE_DIR=\"\" \\&\\& find . -name '.terraform.lock.hcl' -delete \\&\\& terragrunt init -reconfigure/g" scripts/createVPNConfig.sh
          scripts/createVPNConfig.sh staging

      - name: Connect to VPN
        uses: "kota65535/github-openvpn-connect-action@cd2ed8a90cc7b060dc4e001143e811b5f7ea0af5" # v3.1.0
        with:
          config_file: /var/tmp/staging.ovpn
          echo_config: false                  

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --name notification-canada-ca-staging-eks-cluster --alias staging  

      - name: Setup Velero CLI
        uses: ./.github/actions/setup-velero

      - name: Create snapshot
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BACKUP_NAME="staging-snapshot-${TIMESTAMP}"
          echo "Creating backup: $BACKUP_NAME"
          velero backup create "$BACKUP_NAME" --include-namespaces notification-canada-ca --snapshot-volumes=false --wait
          velero backup get "$BACKUP_NAME"

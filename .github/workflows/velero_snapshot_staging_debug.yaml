name: Velero - Snapshot Staging Debug
run-name: Velero - Snapshot (Staging Debug)

on:
  push:
    branches:
      - workflow-staging-test
    paths:
      - '.github/actions/setup-cluster-access/**'
      - '.github/workflows/velero_snapshot_staging_debug.yaml'
      - 'scripts/createVPNConfig.sh'

concurrency:
  group: velero-snapshot-staging-debug
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  AWS_DEFAULT_REGION: ca-central-1
  ENVIRONMENT: staging

permissions:
  id-token: write
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Setup cluster access
        uses: ./.github/actions/setup-cluster-access
        with:
          environment: staging
          aws-account-id: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}
          op-service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_STAGING }}
          role-name: notification-manifests-helmfile-staging-apply

      - name: Setup Velero CLI
        uses: ./.github/actions/setup-velero

      - name: Create snapshot
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BACKUP_NAME="staging-snapshot-${TIMESTAMP}"
          echo "Creating backup: $BACKUP_NAME"
          
          velero backup create "$BACKUP_NAME" \
            --include-namespaces notification-canada-ca \
            --snapshot-volumes=false \
            --wait
          
          velero backup get "$BACKUP_NAME"

      - name: Notify Slack on failure
        if: failure()
        run: |
          # Slack notification disabled during testing
          # json='{"text":"Velero snapshot creation failed for staging (debug workflow): <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"}'
          # curl -X POST -H 'Content-type: application/json' --data "$json" ${{ secrets.SLACK_WEBHOOK }}
          echo "Workflow failed - Slack notification disabled"

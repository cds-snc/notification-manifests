name: Test VPN Connectivity (Old Method - Staging)

on:
  push:
    branches:
      - switch-to-gha-vpn-secrets

env:
  AWS_DEFAULT_REGION: ca-central-1

permissions:
  id-token: write
  contents: read

jobs:
  test-vpn-old:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup cluster access (Old Way from Main)
        uses: cds-snc/notification-manifests/.github/actions/setup-cluster-access@main
        with:
          environment: staging
          aws-account-id: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}
          op-service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_STAGING }}
          role-name: notification-manifests-helmfile-staging-apply

      - name: Verify Cluster Connectivity
        run: |
          echo "Testing connectivity to the staging cluster (Old Method)..."
          kubectl get nodes
          echo "========================================="
          echo "VPN and cluster connection successful!"

name: "Check AWS secrets exist"

on:
  workflow_dispatch:
  pull_request:

defaults:
  run:
    shell: bash

permissions:
  id-token: write   # Required for OIDC token request
  contents: read
  pull-requests: write

jobs:
  check-staging-secrets:
    name: "Staging"
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ca-central-1
      ACCOUNT_ID: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/notification-manifests-helmfile-diff
          role-session-name: NotifyManifestsCheckSecrets
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Check secrets exist in staging AWS
        run: python3 scripts/check-aws-secrets.py

  check-production-secrets:
    name: "Production"
    runs-on: ubuntu-latest
    # Only run on release PRs (AUTO-PR / MANIFEST) — the ones that actually deploy to production.
    # Regular feature PRs will often have secrets that exist in staging but not yet in
    # production (because Terraform hasn't been released there yet), and that is expected.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.base.ref == 'main' &&
       (contains(github.event.pull_request.title, '[AUTO-PR]') ||
        contains(github.event.pull_request.title, '[MANIFEST]')))
    env:
      AWS_DEFAULT_REGION: ca-central-1
      ACCOUNT_ID: ${{ secrets.PRODUCTION_AWS_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Configure AWS credentials (production)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/notification-manifests-helmfile-diff
          role-session-name: NotifyManifestsCheckSecrets
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Check secrets exist in production AWS
        run: python3 scripts/check-aws-secrets.py

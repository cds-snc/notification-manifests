name: Velero - Restore
run-name: Velero - Restore (${{ github.event.inputs.environment }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      backup_name:
        description: Backup name to restore from (run "List Backups" workflow to see available)
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Setup cluster access
        uses: ./.github/actions/setup-cluster-access
        with:
          environment: ${{ github.event.inputs.environment }}
          aws-account-id: ${{ (github.event.inputs.environment == 'dev' && secrets.DEV_AWS_ACCOUNT_ID) || (github.event.inputs.environment == 'staging' && secrets.STAGING_AWS_ACCOUNT_ID) || secrets.PRODUCTION_AWS_ACCOUNT_ID }}
          op-service-account-token: ${{ (github.event.inputs.environment == 'dev' && secrets.OP_SERVICE_ACCOUNT_TOKEN_DEV) || (github.event.inputs.environment == 'staging' && secrets.OP_SERVICE_ACCOUNT_TOKEN_STAGING) || secrets.OP_SERVICE_ACCOUNT_TOKEN_PRODUCTION }}
          role-name: ${{ (github.event.inputs.environment == 'dev' && 'notification-manifests-k8s-lambda-apply-main-branch') || format('notification-manifests-helmfile-{0}-apply', github.event.inputs.environment) }}
          gha-vpn-id: ${{ (github.event.inputs.environment == 'dev' && secrets.GHA_VPN_ID_DEV) || (github.event.inputs.environment == 'staging' && secrets.GHA_VPN_ID_STAGING) || secrets.GHA_VPN_ID_PRODUCTION }}
          gha-vpn-cert: ${{ (github.event.inputs.environment == 'dev' && secrets.GHA_VPN_CERT_DEV) || (github.event.inputs.environment == 'staging' && secrets.GHA_VPN_CERT_STAGING) || secrets.GHA_VPN_CERT_PRODUCTION }}
          gha-vpn-key: ${{ (github.event.inputs.environment == 'dev' && secrets.GHA_VPN_KEY_DEV) || (github.event.inputs.environment == 'staging' && secrets.GHA_VPN_KEY_STAGING) || secrets.GHA_VPN_KEY_PRODUCTION }}

      - name: Setup Velero CLI
        uses: ./.github/actions/setup-velero

      - name: Verify backup exists
        run: |
          echo "Checking backup: ${{ github.event.inputs.backup_name }}"
          velero backup describe "${{ github.event.inputs.backup_name }}"

      - name: Restore from backup
        run: |
          RESTORE_NAME="${{ github.event.inputs.backup_name }}-restore-$(date +%Y%m%d-%H%M%S)"
          echo "Creating restore: $RESTORE_NAME"
          
          velero restore create "$RESTORE_NAME" \
            --from-backup "${{ github.event.inputs.backup_name }}" \
            --existing-resource-policy update \
            --include-resources "deployments,statefulsets,daemonsets,configmaps,secrets,services,ingresses,horizontalpodautoscalers" \
            --wait
          
          velero restore describe "$RESTORE_NAME"

      - name: Wait for workloads to stabilize
        run: |
          set +e
          NAMESPACE="notification-canada-ca"

          echo "Waiting for deployment/statefulset/daemonset rollouts in ${NAMESPACE}..."

          for KIND in deployment statefulset daemonset; do
            echo ""
            echo "Checking ${KIND} rollouts..."
            kubectl get "${KIND}" -n "${NAMESPACE}" --no-headers -o custom-columns=":metadata.name" | while read -r NAME; do
              if [ -n "$NAME" ]; then
                echo "Waiting on ${KIND}/${NAME}"
                kubectl rollout status "${KIND}/${NAME}" -n "${NAMESPACE}" --timeout=300s || true
              fi
            done
          done

          echo ""
          echo "Pod status:"
          kubectl get pods -n "${NAMESPACE}"

      - name: Notify Slack
        if: always()
        run: |
          STATUS=$([ "${{ job.status }}" == "success" ] && echo "✓ completed" || echo "✗ failed")
          json="{\"text\":\"Velero restore $STATUS for ${{ github.event.inputs.environment }}: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow> | Backup: ${{ github.event.inputs.backup_name }}\"}"
          curl -X POST -H 'Content-type: application/json' --data "$json" ${{ secrets.SLACK_WEBHOOK }}

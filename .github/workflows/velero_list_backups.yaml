name: Velero - List Backups
run-name: Velero - List Backups (${{ github.event.inputs.environment || 'staging' }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Setup cluster access
        uses: ./.github/actions/setup-cluster-access
        with:
          environment: ${{ github.event.inputs.environment || 'staging' }}
          aws-account-id: ${{ ((github.event.inputs.environment || 'staging') == 'dev' && secrets.DEV_AWS_ACCOUNT_ID) || ((github.event.inputs.environment || 'staging') == 'staging' && secrets.STAGING_AWS_ACCOUNT_ID) || secrets.PRODUCTION_AWS_ACCOUNT_ID }}
          op-service-account-token: ${{ ((github.event.inputs.environment || 'staging') == 'dev' && secrets.OP_SERVICE_ACCOUNT_TOKEN_DEV) || ((github.event.inputs.environment || 'staging') == 'staging' && secrets.OP_SERVICE_ACCOUNT_TOKEN_STAGING) || secrets.OP_SERVICE_ACCOUNT_TOKEN_PRODUCTION }}
          role-name: ${{ ((github.event.inputs.environment || 'staging') == 'dev' && 'notification-manifests-k8s-lambda-apply-main-branch') || format('notification-manifests-helmfile-{0}-apply', github.event.inputs.environment || 'staging') }}
          gha-vpn-id: ${{ ((github.event.inputs.environment || 'staging') == 'dev' && secrets.GHA_VPN_ID_DEV) || ((github.event.inputs.environment || 'staging') == 'staging' && secrets.GHA_VPN_ID_STAGING) || secrets.GHA_VPN_ID_PRODUCTION }}
          gha-vpn-cert: ${{ ((github.event.inputs.environment || 'staging') == 'dev' && secrets.GHA_VPN_CERT_DEV) || ((github.event.inputs.environment || 'staging') == 'staging' && secrets.GHA_VPN_CERT_STAGING) || secrets.GHA_VPN_CERT_PRODUCTION }}
          gha-vpn-key: ${{ ((github.event.inputs.environment || 'staging') == 'dev' && secrets.GHA_VPN_KEY_DEV) || ((github.event.inputs.environment || 'staging') == 'staging' && secrets.GHA_VPN_KEY_STAGING) || secrets.GHA_VPN_KEY_PRODUCTION }}

      - name: Setup Velero CLI
        uses: ./.github/actions/setup-velero

      - name: List available backups
        run: |
          echo "Full Velero backup list:"
          velero backup get | tee velero_output.txt
          echo ""
          echo "Filtered list (Completed, 0 errors, notification namespace only):"
          awk '$2=="Completed" && $3=="0" && $1 ~ /notification-canada-ca/ {print $1 "\t" $5 " " $6}' velero_output.txt \
            | sort -k2,2r \
            | head -n 5 > backups_raw.txt
          {
            printf "%-55s %s\n" "NAME" "CREATED"
            awk -F "\t" '{printf "%-55s %s\n", $1, $2}' backups_raw.txt
          } > backups.txt
          cat backups.txt
          echo ""
          echo "Use the backup name from the first column in the Velero Restore workflow."

      - name: Send list to Slack
        run: |
          # Grab the filtered list
          BACKUPS=$(cat backups.txt)
          if [ $(wc -l < backups.txt) -le 1 ]; then
            BACKUPS="No completed, error-free backups found."
          fi
          
          # Create JSON payload using jq to safely escape the multiline text
          JSON_PAYLOAD=$(jq -n \
            --arg backups "$BACKUPS" \
            --arg url "https://github.com/${{ github.repository }}/actions/workflows/velero_restore.yaml" \
            --arg env "${{ github.event.inputs.environment || 'staging' }}" \
            '{
              "text": "🗄️ *Available Velero Backups (\($env))*\n```\n\($backups)\n```\n👉 <\($url)|*Click here to run the Restore workflow*>"
            }')
            
          curl -X POST -H 'Content-type: application/json' --data "$JSON_PAYLOAD" ${{ secrets.SLACK_WEBHOOK }}

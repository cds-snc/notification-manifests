name: Staging - Velero Snapshot (Backup)
run-name: Staging - Velero Snapshot

on:
  workflow_dispatch:
    inputs:
      backup_description:
        description: "Optional description for this backup (e.g., 'pre-release-v2.29.2')"
        required: false
        type: string
  workflow_run:
    workflows: ["Staging - Helmfile Apply"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: velero-staging-snapshot
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  STAGING_AWS_ACCOUNT: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}
  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_STAGING }}
  ACCOUNT_ID: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}
  AWS_DEFAULT_REGION: ca-central-1

permissions:
  id-token: write # This is required for requesting the OIDC JWT
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    name: Create Velero Snapshot
    # Only run on successful helmfile_staging_apply completion (not on workflow_dispatch)
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Inject token authentication
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure credentials to Notify using OIDC
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/notification-manifests-helmfile-staging-apply
          role-session-name: NotifyManifestsVeleroSnapshot
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - name: Install 1Pass CLI
        run: |
          curl -o 1pass.deb https://downloads.1password.com/linux/debian/amd64/stable/1password-cli-amd64-latest.deb
          sudo dpkg -i 1pass.deb

      - name: Retrieve VPN Config
        run: |
          scripts/createVPNConfig.sh staging

      - name: Connect to VPN
        uses: kota65535/github-openvpn-connect-action@cd2ed8a90cc7b060dc4e001143e811b5f7ea0af5 # v3.1.0
        with:
          config_file: /var/tmp/staging.ovpn
          echo_config: false

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --name notification-canada-ca-staging-eks-cluster --alias staging

      - name: Install Velero CLI
        run: |
          wget https://github.com/vmware-tanzu/velero/releases/download/v1.13.1/velero-v1.13.1-linux-amd64.tar.gz
          tar -xzf velero-v1.13.1-linux-amd64.tar.gz
          sudo mv velero-v1.13.1-linux-amd64/velero /usr/local/bin/
          velero version

      - name: Create Velero snapshot backup
        env:
          BACKUP_DESCRIPTION: ${{ github.event.inputs.backup_description }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BACKUP_NAME="staging-snapshot-${TIMESTAMP}"
          
          # Add description suffix if provided
          if [ -n "$BACKUP_DESCRIPTION" ]; then
            BACKUP_NAME="${BACKUP_NAME}-${BACKUP_DESCRIPTION}"
          fi
          
          echo "Creating backup: $BACKUP_NAME"
          
          # Create backup excluding PVCs/PVs (we want workload/config snapshot, not storage)
          velero backup create "$BACKUP_NAME" \
            --namespace velero \
            --include-namespaces notification-canada-ca \
            --snapshot-volumes=false \
            --wait
          
          # Verify backup completed
          velero backup get "$BACKUP_NAME" --namespace velero

      - name: Notify Slack channel if this job failed
        if: ${{ failure() }}
        run: |
          json='{"text":"<!here> Staging Velero snapshot creation failed in <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|notification-manifests>."}'
          curl -X POST -H 'Content-type: application/json' --data "$json" ${{ secrets.SLACK_WEBHOOK }}
